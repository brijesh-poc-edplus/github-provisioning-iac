name: deploy-github

on:
  workflow_dispatch:
    
permissions:
  contents: read
  id-token: write

env:
  APP_ID: ${{ secrets.APP_ID }}
  APP_PEM_FILE: ${{ secrets.APP_PEM_FILE }}       
  ORGANIZATION: ${{ secrets.ORGANIZATION }}
  GH_OIDC_ROLE: ${{ secrets.GH_OIDC_ROLE }}
  GH_STATE_BUCKET: ${{ secrets.GH_STATE_BUCKET }}
  GH_STATE_KEY: ${{ secrets.GH_STATE_KEY }}
  INFRA_STATE_BUCKET: ${{ secrets.INFRA_STATE_BUCKET}}
  INFRA_OIDC_ROLE: ${{ secrets.INFRA_OIDC_ROLE }}
  OIDC_ROLE_COMMON_NAME: ${{ secrets.OIDC_ROLE_COMMON_NAME }}
  GH_APP_SLUG: ${{ secrets.GH_APP_SLUG }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      plan_artifact: ${{ steps.upload.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
              python-version: "3.11"

      - name: Install Python deps
        run: pip install requests pyjwt cryptography
          
      - name: Get GitHub App Installation ID
        id: get_installation_id
        env:
            APP_ID: ${{ env.APP_ID }}
            APP_PEM: ${{ env.APP_PEM_FILE }}
            ORGANIZATION: ${{ env.ORGANIZATION }}
        run: echo "INSTALLATION_ID=$(python scripts/get_installation_id.py)" >> "$GITHUB_OUTPUT"

      - name: Assume maroon role (OIDC) for backend access
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ env.GH_OIDC_ROLE }}
          aws-region: us-east-1

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Terraform init
        env:
          TF_VAR_github_organization: ${{ env.ORGANIZATION }}
          TF_VAR_app_id: ${{ env.APP_ID }}
          TF_VAR_app_pem_file: ${{ env.APP_PEM_FILE }}
          TF_VAR_app_installation_id: ${{ steps.get_installation_id.outputs.INSTALLATION_ID }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.GH_STATE_BUCKET }}" \
            -backend-config="key=${{ env.GH_STATE_KEY }}" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"

      - name: Terraform plan (save binary plan)
        env:
          TF_VAR_github_organization: ${{ env.ORGANIZATION }}
          TF_VAR_app_id: ${{ env.APP_ID }}
          TF_VAR_app_pem_file: ${{ env.APP_PEM_FILE }}
          TF_VAR_app_installation_id: ${{ steps.get_installation_id.outputs.INSTALLATION_ID }}
          TF_VAR_infra_state_bucket: ${{ env.INFRA_STATE_BUCKET }}
          TF_VAR_infra_oidc_role: ${{ env.INFRA_OIDC_ROLE }}
          TF_VAR_oidc_role_common_name: ${{ env.OIDC_ROLE_COMMON_NAME }}
          TF_VAR_github_app_slug: ${{ env.GH_APP_SLUG }}
        run: terraform plan -out=tfplan

      - name: Save plan for review
        run: terraform show tfplan

      - name: Upload plan artifact
        id: upload
        uses: actions/upload-artifact@v6.0.0
        with:
          name: tfplan
          path: tfplan

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    environment: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
              python-version: "3.11"

      - name: Install Python deps
        run: pip install requests pyjwt cryptography
          
      - name: Get GitHub App Installation ID
        id: get_installation_id
        env:
            APP_ID: ${{ env.APP_ID }}
            APP_PEM: ${{ env.APP_PEM_FILE }}
            ORGANIZATION: ${{ env.ORGANIZATION }}
        run: echo "INSTALLATION_ID=$(python scripts/get_installation_id.py)" >> "$GITHUB_OUTPUT"

      - name: Download plan artifact
        uses: actions/download-artifact@v7.0.0
        with:
          name: tfplan
          path: .

      - name: Assume maroon role (OIDC) for backend access
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ env.GH_OIDC_ROLE }}
          aws-region: us-east-1
          
      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.GH_STATE_BUCKET }}" \
            -backend-config="key=${{ env.GH_STATE_KEY }}" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        env:
          TF_VAR_github_organization: ${{ env.ORGANIZATION }}
          TF_VAR_app_id: ${{ env.APP_ID }}
          TF_VAR_app_pem_file: ${{ env.APP_PEM_FILE }}
          TF_VAR_app_installation_id: ${{ steps.get_installation_id.outputs.INSTALLATION_ID }}
          TF_VAR_infra_state_bucket: ${{ env.INFRA_STATE_BUCKET }}
          TF_VAR_infra_oidc_role: ${{ env.INFRA_OIDC_ROLE }}
          TF_VAR_oidc_role_common_name: ${{ env.OIDC_ROLE_COMMON_NAME }}
          TF_VAR_github_app_slug: ${{ env.GH_APP_SLUG }}
        run: terraform apply -input=false tfplan